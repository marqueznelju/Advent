<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        :root {
            --bg-blur: 20px;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        /* Background Transitioning Images */
        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(var(--bg-blur));
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        /* UI Container */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            backdrop-filter: blur(5px);
        }

        h1 { font-size: 3rem; margin-bottom: 2rem; font-weight: 600; letter-spacing: -1px; }

        .card-group {
            display: flex;
            gap: 20px;
        }

        .card {
            width: 250px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.12);
        }

        .card img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="bg-container"></div>

    <div class="container">
        <h1>Leopard Motors</h1>
        <div class="card-group">
            <a href="https://marqueznelju.github.io/Advent/GTS/index.html" class="card">
                <img src="img/gts.png" alt="GTS">
                <h3>GTS Variant</h3>
            </a>
            <a href="https://marqueznelju.github.io/Advent/Ecobeast/index.html" class="card">
                <img src="img/eco.png" alt="Ecobeast">
                <h3>Ecobeast Variant</h3>
            </a>
        </div>
    </div>

    <script>
        const images = ['img/2.png', 'img/3.png', 'img/8.png', 'img/4.png'];
        const container = document.getElementById('bg-container');
        let currentIndex = 0;

        function updateBackground() {
            const imgElement = document.createElement('div');
            imgElement.className = 'bg-img';
            imgElement.style.backgroundImage = `url('${images[currentIndex]}')`;
            container.appendChild(imgElement);
            
            // Trigger fade in
            setTimeout(() => imgElement.style.opacity = '1', 50);

            // Remove old background
            if (container.children.length > 1) {
                const oldImg = container.children[0];
                oldImg.style.opacity = '0';
                setTimeout(() => oldImg.remove(), 1500);
            }

            currentIndex = (currentIndex + 1) % images.length;
        }

        // Initialize and interval
        updateBackground();
        setInterval(updateBackground, 2000);
    </script>
</body>
</html>
