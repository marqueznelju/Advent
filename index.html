<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --bg-transition: opacity 1.5s ease-in-out; }
        
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; background: #000; }

        /* Background Slider */
        #bg-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(20px); opacity: 0; transition: var(--bg-transition); }
        .bg-slide.active { opacity: 1; }

        /* UI Card */
        .card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: white; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        h1 { margin-bottom: 30px; font-weight: 600; letter-spacing: -1px; }

        .btn-container { display: flex; gap: 20px; }
        .variant-btn {
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 20px;
            cursor: pointer; transition: transform 0.3s ease, background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1); width: 120px;
        }
        .variant-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
        img { width: 100%; height: auto; }
    </style>
</head>
<body>

    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
        <div class="bg-slide" style="background-image: url('img/4.png');"></div>
    </div>

    <div class="card">
        <h1>Leopard Motors</h1>
        <div class="btn-container">
            <div class="variant-btn" onclick="window.location.href='https://marqueznelju.github.io/Advent/GTS/index.html'">
                <img src="img/gts.png" alt="GTS">
            </div>
            <div class="variant-btn" onclick="window.location.href='https://marqueznelju.github.io/Advent/Ecobeast/index.html'">
                <img src="img/eco.png" alt="Ecobeast">
            </div>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 2000);
    </script>
</body>
</html>
