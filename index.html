<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        :root {
            --glass-card: rgba(255, 255, 255, 0.07);
            --glass-card-hover: rgba(255, 255, 255, 0.13);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --glass-border-hover: 1px solid rgba(255, 255, 255, 0.22);
            --blur-heavy: blur(48px);
            --blur-medium: blur(28px);
            --blur-light: blur(16px);
            --radius-card: 28px;
            --radius-btn: 22px;
            --radius-pill: 100px;
            --radius-sm: 14px;
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.55), 0 2px 12px rgba(0, 0, 0, 0.3);
            --shadow-btn: 0 8px 24px rgba(0, 0, 0, 0.35);
            --bg-transition: opacity 2.2s ease-in-out;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", sans-serif;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* ─── Background ─── */
        #bg-container {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: #7e7e7e;
        }

        /* Extra dark overlay for depth */
        #bg-container::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.38);
            z-index: 1;
        }

        .bg-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            filter: blur(52px) brightness(50%) saturate(120%);
            opacity: 0;
            transition: var(--bg-transition);
            transform: scale(1);
            will-change: opacity;
        }

        .bg-slide.active { opacity: 1; }

        /* ─── Loader ─── */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: var(--blur-medium);
            -webkit-backdrop-filter: var(--blur-medium);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #loader-overlay.active { opacity: 1; pointer-events: all; }

        .spinner {
            width: 36px; height: 36px;
            border: 2.5px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ─── Notification Banner ─── */
        #popup-overlay {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 10000;
            opacity: 0;
            transform: translateY(-24px) scale(0.96);
            pointer-events: none;
            transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
            max-width: 360px;
            width: calc(100vw - 36px);
        }

        #popup-overlay.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .apple-alert {
            background: rgba(28, 28, 32, 0.72);
            backdrop-filter: blur(52px) saturate(160%);
            -webkit-backdrop-filter: blur(52px) saturate(160%);
            border: 0.5px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            padding: 14px 16px 14px 14px;
            box-shadow: 0 20px 48px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .alert-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .alert-icon {
            width: 28px; height: 28px;
            background: linear-gradient(145deg, #ff9f0a, #ff453a);
            border-radius: 7px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alert-icon svg {
            width: 15px; height: 15px;
            fill: none;
            stroke: rgba(255,255,255,0.9);
            stroke-width: 2;
            stroke-linecap: round;
        }

        .alert-title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.15px;
            color: var(--text-primary);
            flex: 1;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: var(--text-secondary);
            width: 20px; height: 20px;
            border-radius: 50%;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }

        .close-btn:hover { background: rgba(255,255,255,0.16); color: #fff; }

        .alert-message {
            font-size: 12.5px;
            line-height: 1.45;
            color: var(--text-secondary);
            padding-left: 38px;
            letter-spacing: -0.1px;
        }

        /* ─── Main Layout ─── */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px 16px;
            width: 100%;
            max-width: 580px;
            z-index: 1;
            background-color: transparent;
        }

        /* ─── Card ─── */
        .card {
            width: 100%;
            background: var(--glass-card);
            backdrop-filter: var(--blur-heavy) saturate(160%);
            -webkit-backdrop-filter: var(--blur-heavy) saturate(160%);
            border: var(--glass-border);
            border-radius: var(--radius-card);
            padding: 40px 32px 36px;
            box-shadow: var(--shadow-card), inset 0 1px 0 rgba(255,255,255,0.07);
            text-align: center;
        }

        /* subtle inner top highlight */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 16px; right: 16px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            border-radius: 50%;
        }

        .card { position: relative; }

        .brand-eyebrow {
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 10px;
        }

        h1 {
            font-size: clamp(1.9rem, 5vw, 2.5rem);
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.08;
            margin-bottom: 8px;
            background: linear-gradient(160deg, #fff 60%, rgba(255,255,255,0.55));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: -0.2px;
            margin-bottom: 32px;
        }

        /* ─── Vehicle Buttons ─── */
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .variant-btn {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: var(--radius-btn);
            padding: 22px 18px 18px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            transition:
                background 0.3s ease,
                border-color 0.3s ease,
                transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275),
                box-shadow 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .variant-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: linear-gradient(160deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        .variant-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.22);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
        }

        .variant-btn:active {
            transform: scale(0.97);
            transition-duration: 0.1s;
        }

        .variant-btn img {
            width: 100%;
            height: 110px;
            object-fit: contain;
            border-radius: 10px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.45));
            transition: transform 0.3s ease;
        }

        .variant-btn:hover img {
            transform: scale(1.04) translateY(-2px);
        }

        .variant-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }

        .variant-title {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .variant-sub {
            font-size: 11.5px;
            color: var(--text-tertiary);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* ─── Footer Links ─── */
        .footer-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            align-items: center;
        }

        .footer-notice {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: var(--glass-border);
            border-radius: var(--radius-pill);
            padding: 12px 22px;
            font-size: 13.5px;
            font-weight: 500;
            letter-spacing: -0.2px;
            color: rgba(255, 255, 255, 0.75);
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 420px;
            transition: background 0.3s, border-color 0.3s, transform 0.25s ease, color 0.2s;
        }

        .footer-notice svg {
            width: 14px; height: 14px;
            opacity: 0.5;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: opacity 0.2s;
        }

        .footer-notice:hover {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.95);
            transform: translateY(-2px);
        }

        .footer-notice:hover svg { opacity: 0.8; }

        .footer-notice:active { transform: scale(0.98); }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            body, html { justify-content: flex-start; }

            .page-wrapper {
                padding: 88px 14px 32px;
                gap: 12px;
            }

            .card { padding: 30px 20px 26px; }

            #popup-overlay {
                top: 14px;
                left: 14px;
                right: 14px;
                max-width: none;
                width: auto;
            }
        }

        @media (max-width: 420px) {
            .btn-container {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .variant-btn {
                flex-direction: row;
                padding: 14px 18px;
                gap: 18px;
                border-radius: 18px;
            }

            .variant-btn img {
                width: 72px;
                height: 52px;
                flex-shrink: 0;
            }

            .variant-label { align-items: flex-start; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Notification Banner -->
    <div id="popup-overlay">
        <div class="apple-alert">
            <div class="alert-header">
                <div class="alert-icon">
                    <svg viewBox="0 0 15 15"><path d="M7.5 2v5.5M7.5 11v.5"/></svg>
                </div>
                <span class="alert-title">Showcase Notice</span>
                <button class="close-btn" onclick="closeNotice()" aria-label="Close">✕</button>
            </div>
            <p class="alert-message">This website is a project showcase for the Automation game — not an official commercial platform.</p>
        </div>
    </div>

    <!-- Background Slider -->
    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
    </div>

    <!-- Main Content -->
    <div class="page-wrapper">
        <div class="card">
            <p class="brand-eyebrow">Select Your Vehicle</p>
            <h1>Leopard Motors</h1>
            <p class="card-subtitle">Choose a model to explore</p>

            <div class="btn-container">
                <div class="variant-btn" onclick="navigateWithLoader('GTS/index.html')">
                    <img src="img/gts.png" alt="GTS">
                    <div class="variant-label">
                        <span class="variant-title">GTS</span>
                        <span class="variant-sub">Sport</span>
                    </div>
                </div>

                <div class="variant-btn" onclick="navigateWithLoader('Ecobeast/index.html')">
                    <img src="img/eco.png" alt="Ecobeast">
                    <div class="variant-label">
                        <span class="variant-title">Ecobeast</span>
                        <span class="variant-sub">Efficient</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer-links">
            <a class="footer-notice" href="https://store.steampowered.com/app/293760/Automation__The_Car_Company_Tycoon_Game/" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>
                Download Automation on Steam
            </a>
            <a class="footer-notice" href="https://docs.google.com/forms/d/e/1FAIpQLSft4gtBUl8l10hM1h9PtrTVIA1t-3PjyGEAuU3cN5UBlWb4DQ/viewform?usp=header" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                Send Suggestions
            </a>
        </div>
    </div>

    <script>
        // Background Slider
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        if (slides.length > 1) {
            setInterval(() => {
                slides[current].classList.remove('active');
                current = (current + 1) % slides.length;
                slides[current].classList.add('active');
            }, 4000);
        }

        // Navigation with Loader
        function navigateWithLoader(url) {
            document.getElementById('loader-overlay').classList.add('active');
            setTimeout(() => { window.location.href = url; }, 900);
        }

        // Notification Logic
        window.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('showcaseNoticeDismissed')) {
                setTimeout(() => {
                    const popup = document.getElementById('popup-overlay');
                    if (popup) popup.classList.add('show');
                }, 700);
                setTimeout(closeNotice, 7700);
            }
        });

        function closeNotice() {
            const popup = document.getElementById('popup-overlay');
            if (popup && popup.classList.contains('show')) {
                popup.classList.remove('show');
                sessionStorage.setItem('showcaseNoticeDismissed', 'true');
            }
        }
    </script>
</body>
</html>
