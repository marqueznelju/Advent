<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        :root { 
            --bg-transition: opacity 2s ease-in-out; 
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* Background Slider */
        #bg-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -2; 
            background: black; 
        }
        
        .bg-slide { 
            position: absolute; 
            width: 100%; height: 100%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(50px) brightness(40%); 
            opacity: 0; 
            transition: var(--bg-transition); 
            transform: scale(1.15); 
        }
        
        .bg-slide.active { 
            opacity: 1; 
        }

        /* Loading Screen */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* Apple Notification Banner Style */
        #popup-overlay {
            position: fixed;
            top: 20px; 
            right: 20px;
            z-index: 10000;
            opacity: 0;
            transform: translateY(-30px) scale(0.95);
            pointer-events: none;
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
        }

        #popup-overlay.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .apple-alert {
            background: rgba(30, 30, 30, 0.65);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            width: 340px;
            padding: 14px 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            box-sizing: border-box;
            position: relative;
        }

        .alert-header {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }

        .alert-icon {
            width: 18px;
            height: 18px;
            background: linear-gradient(135deg, #ff9500, #ff5e3a);
            border-radius: 4px;
            margin-right: 8px;
        }

        .alert-title {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            letter-spacing: -0.1px;
            margin: 0;
            flex-grow: 1;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
        }

        .alert-message {
            font-size: 13px;
            font-weight: 400;
            line-height: 16px;
            margin: 0;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: -0.1px;
            padding-left: 26px;
        }

        /* Main UI Card */
        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; 
            border-radius: 32px; 
            border: var(--glass-border);
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 540px;
            margin: 40px auto 20px auto;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            margin-top: 0;
            margin-bottom: 10px; 
            font-size: 2.2rem;
            font-weight: 600; 
            letter-spacing: -1px; 
        }

        .card p {
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* Vehicle Buttons */
        .btn-container { 
            display: flex; 
            flex-direction: row;
            gap: 20px; 
            justify-content: center;
        }

        .variant-btn {
            background: rgba(68, 68, 68, 0.219); 
            padding: 20px; 
            border-radius: 24px;
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            border: var(--glass-border); 
            flex: 1;
            max-width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .variant-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(1.04); 
        }

        .variant-btn img { 
            width: 100%; 
            height: auto; 
            max-height: 120px; 
            object-fit: contain;  
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .variant-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* Footer Notification Links */
        .footer-notice {
            display: block;
            text-decoration: none;
            margin-bottom: 15px; 
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: rgb(255, 255, 255);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            transition: background 0.3s, transform 0.2s;
        }

        .footer-notice:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Tablet Responsive Breakpoint */
        @media (max-width: 768px) {
            .card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 2rem;
            }
        }

        /* Mobile Responsive Breakpoint */
        @media (max-width: 500px) {
            body, html {
                overflow-y: auto; 
                justify-content: flex-start;
                padding: 20px 0;
            }
            #popup-overlay {
                top: 15px;
                left: 15px;
                right: 15px;
                transform: translateY(-40px) scale(0.95);
            }
            .apple-alert {
                width: 100%;
            }
            .card {
                padding: 30px 20px;
                margin: 80px auto 20px auto; /* More margin on top so notifications don't overlap layout */
            }
            h1 {
                font-size: 1.8rem;
            }
            .btn-container {
                flex-direction: column; 
                align-items: center;
                gap: 15px;
            }
            .variant-btn {
                width: 100%;
                max-width: 100%;
                flex-direction: row; 
                padding: 15px 20px;
                gap: 20px;
                justify-content: flex-start;
            }
            .variant-btn img {
                width: 70px;
                height: 50px;
                max-height: 50px;
                object-fit: contain;
            }
            .variant-title {
                font-size: 1.1rem;
            }
            .footer-notice {
                font-size: 0.85rem;
                padding: 12px 15px;
            }
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Apple Push Notification Banner -->
    <div id="popup-overlay">
        <div class="apple-alert">
            <div class="alert-header">
                <div class="alert-icon"></div>
                <h2 class="alert-title">Showcase Notice</h2>
                <button class="close-btn" onclick="closeNotice()">✕</button>
            </div>
            <p class="alert-message">This website serves strictly as a project showcase for the Automation game. It is not an official commercial platform.</p>
        </div>
    </div>

    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
    </div>

    <div class="card">
        <h1>Leopard Motors</h1>
        <p>Choose your vehicle</p>
        <div class="btn-container">
            <div class="variant-btn" onclick="navigateWithLoader('GTS/index.html')">
                <img src="img/gts.png" alt="GTS">
                <span class="variant-title">GTS</span>
            </div>
            
            <div class="variant-btn" onclick="navigateWithLoader('Ecobeast/index.html')">
                <img src="img/eco.png" alt="Ecobeast">
                <span class="variant-title">Ecobeast</span>
            </div>
        </div>
    </div>

    <a class="footer-notice" href="https://store.steampowered.com/app/293760/Automation__The_Car_Company_Tycoon_Game/">
        Download Automation on Steam!
    </a>
    <a class="footer-notice" href="https://docs.google.com/forms/d/e/1FAIpQLSft4gtBUl8l10hM1h9PtrTVIA1t-3PjyGEAuU3cN5UBlWb4DQ/viewform?usp=header">
        Send suggestions!
    </a>
    

    <script>
        // Background Slider Logic
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        setInterval(() => {
            if(slides.length === 0) return;
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 2000); 

        // Apple UI Style Navigation Loader
        function navigateWithLoader(url) {
            const loader = document.getElementById('loader-overlay');
            loader.classList.add('active');
            
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }

        // Showcase Pop-up Session Logic
        window.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('showcaseNoticeDismissed')) {
                setTimeout(() => {
                    const popup = document.getElementById('popup-overlay');
                    if(popup) popup.classList.add('show');
                }, 600);

                setTimeout(() => {
                    closeNotice();
                }, 7600);
            }
        });

        function closeNotice() {
            const popup = document.getElementById('popup-overlay');
            if (popup && popup.classList.contains('show')) {
                popup.classList.remove('show');
                sessionStorage.setItem('showcaseNoticeDismissed', 'true');
            }
        }
    </script>
</body>
</html>
